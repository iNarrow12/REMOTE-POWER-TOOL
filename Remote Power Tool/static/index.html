<!doctype html>
<html>
<head>
    <title>Remote PC Power Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1e1e1e; color: white; padding: 40px; }
        button { width: 90%; max-width: 300px; padding: 15px; margin: 10px; font-size: 18px; background-color: #0a92e4; color: white; border: none; border-radius: 10px; cursor: pointer; }
        h2 { margin-bottom: 30px; }
        .collapsible {
            background-color: #0a92e4;
            color: white;
            cursor: pointer;
            padding: 15px;
            width: 100%;
            border: none;
            text-align: center;
            font-size: 18px;
            margin: 10px 0;
            border-radius: 10px;
        }
        .active, .collapsible:hover {
            background-color: #005f88;
        }
        .content {
            padding: 0 18px;
            display: none;
            overflow: hidden;
            background-color: #222222;
            border-radius: 10px;
        }
        .slider {
            width: 90%;
            max-width: 300px;
            margin: 10px 0;
        }
        .slider-value {
            color: white;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h2>Remote PC Power Control</h2>

    <button class="collapsible">Power Control</button>
    <div class="content">
        <button onclick="sendAction('shutdown')">Shutdown</button>
        <button onclick="sendAction('restart')">Restart</button>
        <button onclick="sendAction('lock')">Lock</button>
        <button onclick="sendAction('logoff')">Log Off</button>
        <button onclick="sendAction('sleep')">Sleep</button>
    </div>

    <button class="collapsible">System Controls</button>
    <div class="content">
        <label for="volume">Volume:</label><br>
        <input type="range" id="volume" min="0" max="100" value="50" class="slider" onchange="updateSlider(this, 'volume-value', 'set_volume', 'volume')">
        <span id="volume-value" class="slider-value">50</span><br>

        <label for="brightness">Brightness:</label><br>
        <input type="range" id="brightness" min="0" max="100" value="50" class="slider" onchange="updateSlider(this, 'brightness-value', 'set_brightness', 'brightness')">
        <span id="brightness-value" class="slider-value">50</span><br>

        <button onclick="sendAction('custom_fixed')">Run Fixed Script</button>
        <button onclick="runUserScript()">Run Your Script</button>
        <button onclick="sendAction('stop')">Stop Remote Tool</button>
    </div>

    <button class="collapsible">Screen Controls</button>
    <div class="content">
        <button onclick="sendAction('screenoff')">Turn Off Screen</button>
    </div>

    <script>
        var coll = document.getElementsByClassName("collapsible");
        for (let i = 0; i < coll.length; i++) {
            coll[i].addEventListener("click", function() {
                this.classList.toggle("active");
                var content = this.nextElementSibling;
                content.style.display = (content.style.display === "block") ? "none" : "block";
            });
        }

        function updateSlider(slider, labelId, action, key) {
            const value = slider.value;
            document.getElementById(labelId).innerText = value;
            const data = {};
            data[key] = value;
            sendAction(action, data);
        }

        function sendAction(action, extraData = {}) {
            const data = new URLSearchParams({ action, ...extraData });
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: data
            }).then(response => {
                console.log(`Action "${action}" sent.`);
            }).catch(err => console.error('Error:', err));
        }

        function runUserScript() {
            const path = prompt("Enter the full path to your custom script:");
            if (path) sendAction('custom', { script_path: path });
        }
    </script>
</body>
</html>
